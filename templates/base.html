<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Event Forms</title>
	<style>
		body { font-family: Arial, sans-serif; margin: 40px; background: #f9f9f9; }
		.container { max-width: 700px; margin: auto; background: #fff; padding: 30px; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
		h2 { margin-bottom: 20px; }
		form { margin-bottom: 20px; }
		.error { color: #b00; margin-top: 20px; }
		label { font-weight: bold; }
		input, select, textarea { width: 100%; margin-bottom: 15px; padding: 8px; border-radius: 4px; border: 1px solid #ccc; }
		button { background: #007bff; color: #fff; border: none; padding: 10px 20px; border-radius: 4px; cursor: pointer; }
		button:hover { background: #0056b3; }
	</style>
</head>
<body>
	<div class="container">
		{% block content %}{% endblock %}
	</div>
</body>
</html>
