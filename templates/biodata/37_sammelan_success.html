<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Registration Successful</title>
  <style>
    body { font-family: 'Poppins', Arial, sans-serif; background: #f0f2f8; text-align: center; padding: 60px 20px; }
    .success-box { background: #fff; border-radius: 16px; box-shadow: 0 4px 24px rgba(60,60,120,0.10); max-width: 480px; margin: 0 auto; padding: 40px 24px; }
    h1 { color: #5c2d91; font-size: 2rem; margin-bottom: 18px; }
    p { color: #333; font-size: 1.1rem; margin-bottom: 24px; }
    .btn { background: linear-gradient(90deg, #3a3a7c 0%, #e36db6 100%); color: #fff; font-weight: 700; border: none; border-radius: 8px; padding: 14px 32px; font-size: 1.1em; cursor: pointer; text-decoration: none; }
    .btn:hover { background: linear-gradient(90deg, #e36db6 0%, #3a3a7c 100%); }
  </style>
</head>
<body>
  <div class="success-box">
    <h1>🎉 Registration Successful!</h1>
    <p>Your 37th Sammelan form has been submitted.<br>Thank you for registering!</p>

  </div>

</html>
