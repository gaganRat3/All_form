
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Support Request Submitted</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            font-family: 'Inter', sans-serif;
        }
        .gradient-bg {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        .glass-card {
            background: rgba(255,255,255,0.95);
            backdrop-filter: blur(10px);
            border-radius: 2rem;
            box-shadow: 0 10px 40px rgba(102,126,234,0.15);
            animation: fadeInUp 0.7s cubic-bezier(.4,0,.2,1);
        }
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(40px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .success-icon {
            animation: popIn 0.5s cubic-bezier(.4,0,.2,1);
        }
        @keyframes popIn {
            0% { transform: scale(0.5); opacity: 0; }
            80% { transform: scale(1.2); opacity: 1; }
            100% { transform: scale(1); }
        }
        .btn-home {
            background: linear-gradient(135deg, #10b981 0%, #059669 100%);
            transition: all 0.3s ease;
        }
        .btn-home:hover {
            background: linear-gradient(135deg, #059669 0%, #10b981 100%);
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(16,185,129,0.2);
        }
    </style>
</head>
<body class="gradient-bg min-h-screen flex items-center justify-center">
    <div class="glass-card max-w-md w-full mx-auto p-8 text-center">
        <div class="flex flex-col items-center">
            <span class="success-icon mb-4">
                <i class="fas fa-check-circle text-green-500 text-6xl"></i>
            </span>
            <h1 class="text-4xl font-extrabold text-gray-800 mb-2 tracking-tight">Thank You!</h1>
            <p class="text-lg text-gray-700 mb-4">Your support request has been <span class="font-semibold text-green-600">successfully submitted</span>.</p>
            <div class="mb-6">
                <span class="inline-block bg-green-100 text-green-700 px-4 py-2 rounded-full text-sm font-medium">We'll get back to you within 24 hours.</span>
            </div>
            <a href="/" class="btn-home px-8 py-3 text-white font-semibold rounded-lg shadow-lg">Go to Home</a>
        </div>
    </div>
</body>
</html>
